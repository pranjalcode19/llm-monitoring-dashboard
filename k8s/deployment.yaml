apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-monitoring-dashboard
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: llm-monitoring-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-monitoring-dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-monitoring-dashboard
      annotations:
        # Prometheus scrape annotations — tells Prometheus to scrape this pod
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: llm-monitoring-dashboard
                topologyKey: kubernetes.io/hostname
      containers:
        - name: llm-monitoring-dashboard
          image: llm-monitoring-dashboard:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: OLLAMA_HOST
              valueFrom:
                secretKeyRef:
                  name: llm-monitoring-dashboard-secret
                  key: OLLAMA_HOST
          volumeMounts:
            # Level 2: PVC keeps metrics.db across pod restarts
            # Without this, every restart loses all historical metrics
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: llm-monitoring-dashboard-data
